services:
  bot:
    build: .
    command: python3 bot.py
    env_file: .env
    environment:
      DB_PATH: /app/data/booking.db
      TZ: Asia/Almaty
    volumes:
      - ./data:/app/data
      - ./webapp/uploads:/app/webapp/uploads
    restart: unless-stopped
    mem_limit: 150m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build: .
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --log-level warning
    env_file: .env
    environment:
      DB_PATH: /app/data/booking.db
      TZ: Asia/Almaty
    volumes:
      - ./data:/app/data
      - ./webapp/uploads:/app/webapp/uploads
    ports:
      - "127.0.0.1:8002:8000"
    restart: unless-stopped
    mem_limit: 150m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
